name: Nightly QA Pipeline — BidDeed + ZoneWise

on:
  schedule:
    - cron: '0 4 * * *'  # 11PM EST = 4AM UTC
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  ZONEWISE_AGENTS_URL: https://zonewise-agents.onrender.com
  ZONEWISE_WEB_URL: https://zonewise.ai

jobs:
  biddeed-unit:
    name: BidDeed Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pytest pytest-json-report --break-system-packages
      - name: Clone biddeed repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/breverdbidder/biddeed-conversational-ai.git biddeed
          cp tests/biddeed/test_bid_logic.py biddeed/tests/
          cp tests/biddeed/test_agent_integration.py biddeed/tests/
      - name: Run unit tests (explicit files only)
        working-directory: biddeed
        run: |
          python -m pytest \
            tests/test_bid_logic.py \
            tests/test_agent_integration.py \
            -v --json-report --json-report-file=unit-results.json \
            --tb=short || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biddeed-unit-results
          path: biddeed/unit-results.json

  biddeed-deepeval:
    name: BidDeed DeepEval Evals
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install deepeval pytest pytest-json-report anthropic --break-system-packages
      - name: Clone biddeed repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/breverdbidder/biddeed-conversational-ai.git biddeed
          cp tests/biddeed/test_deepeval_evals.py biddeed/tests/
      - name: Run DeepEval tests (explicit file only)
        working-directory: biddeed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
        run: |
          python -m pytest \
            tests/test_deepeval_evals.py \
            -v --json-report --json-report-file=deepeval-results.json \
            --tb=short || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biddeed-deepeval-results
          path: biddeed/deepeval-results.json

  zonewise-agents:
    name: ZoneWise Agent Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pytest pytest-json-report httpx --break-system-packages
      - name: Clone zonewise-agents repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/breverdbidder/zonewise-agents.git zagents
          cp tests/zonewise_agents/test_agent_health.py zagents/tests/
          cp tests/zonewise_agents/test_langgraph_trajectory.py zagents/tests/
      - name: Warm up Render (prevent cold start failures)
        run: |
          curl -sf https://zonewise-agents.onrender.com/health --max-time 30 || \
          (echo "Cold start — waiting 45s..." && sleep 45 && \
           curl -sf https://zonewise-agents.onrender.com/health --max-time 30) || \
          echo "Service slow — tests will handle timeouts"
      - name: Run agent tests (our files only — exclude pre-existing broken tests)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m pytest \
            zagents/tests/test_agent_health.py \
            zagents/tests/test_langgraph_trajectory.py \
            -v --json-report --json-report-file=agent-results.json \
            --tb=short || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zonewise-agent-results
          path: agent-results.json

  zonewise-playwright:
    name: ZoneWise E2E Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install chromium --with-deps
      - name: Copy E2E tests
        run: |
          cp tests/zonewise_web/e2e_zonewise.spec.ts .
          cp tests/zonewise_web/playwright.config.ts .
      - name: Run Playwright tests
        run: npx playwright test --config=playwright.config.ts || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zonewise-playwright-results
          path: playwright-results.json

  aggregate-and-notify:
    name: Aggregate Results + Telegram Report
    runs-on: ubuntu-latest
    needs: [biddeed-unit, biddeed-deepeval, zonewise-agents, zonewise-playwright]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install supabase requests --break-system-packages
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Aggregate + log to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/aggregate_results.py
      - name: Send Telegram report
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/qa_notifier.py nightly
      - name: Open GitHub Issue on failure
        if: env.FAILURES_FOUND == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh issue create \
            --title "🚨 QA Below 90% Threshold — $(date +'%Y-%m-%d')" \
            --body "Pipeline below 90% benchmark. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "qa-critical,ariel-review" \
            --repo breverdbidder/qa-agentic-pipeline || true
      - name: Fail job if thresholds breached
        if: env.FAILURES_FOUND == 'true'
        run: exit 1
