name: Nightly QA Pipeline — BidDeed + ZoneWise

on:
  schedule:
    # 11PM EST = 4AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test (biddeed|zonewise|all)'
        required: false
        default: 'all'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
  LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
  LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ─────────────────────────────────────────
  # LAYER 1: BidDeed Unit + Integration Tests
  # ─────────────────────────────────────────
  biddeed-pytest:
    name: BidDeed — pytest (unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          repository: breverdbidder/biddeed-conversational-ai
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --break-system-packages
          pip install deepeval pytest-json-report --break-system-packages

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short \
            --json-report --json-report-file=results_unit.json \
            -m "unit" || true

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short \
            --json-report --json-report-file=results_integration.json \
            -m "integration and not scraper" || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: biddeed-pytest-results
          path: results_*.json

  # ─────────────────────────────────────────
  # LAYER 2: BidDeed DeepEval Evals
  # ─────────────────────────────────────────
  biddeed-deepeval:
    name: BidDeed — DeepEval (LLM-as-judge)
    runs-on: ubuntu-latest
    needs: biddeed-pytest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deepeval
        run: pip install deepeval --break-system-packages

      - name: Run BidDeed eval suite
        run: |
          deepeval test run tests/biddeed/evals/ \
            --output-file results_biddeed_evals.json || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: biddeed-deepeval-results
          path: results_biddeed_evals.json

  # ─────────────────────────────────────────
  # LAYER 3: ZoneWise Agent Tests
  # ─────────────────────────────────────────
  zonewise-agent-tests:
    name: ZoneWise — Agent Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          repository: breverdbidder/zonewise-agents
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --break-system-packages
          pip install deepeval agentevals pytest-json-report --break-system-packages

      - name: Run agent tests
        run: |
          pytest tests/ -v --tb=short \
            --json-report --json-report-file=results_zonewise_agent.json || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: zonewise-agent-results
          path: results_zonewise_agent.json

  # ─────────────────────────────────────────
  # LAYER 4: ZoneWise Playwright E2E
  # ─────────────────────────────────────────
  zonewise-playwright:
    name: ZoneWise — Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          repository: breverdbidder/zonewise-web
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          npx playwright test tests/e2e/ \
            --reporter=json \
            --output=playwright_results.json || true
        env:
          BASE_URL: https://zonewise.ai

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: zonewise-playwright-results
          path: playwright_results.json

  # ─────────────────────────────────────────
  # LAYER 5: LangGraph Trajectory Validation
  # ─────────────────────────────────────────
  langgraph-trajectory:
    name: LangGraph Trajectory Validation (agentevals)
    runs-on: ubuntu-latest
    needs: [biddeed-pytest, zonewise-agent-tests]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agentevals
        run: pip install agentevals langgraph anthropic --break-system-packages

      - name: Run trajectory validation
        run: python scripts/validate_trajectories.py

  # ─────────────────────────────────────────
  # FINAL: Aggregate Results → Supabase
  # ─────────────────────────────────────────
  aggregate-and-log:
    name: Aggregate Results + Log to Supabase
    runs-on: ubuntu-latest
    needs:
      - biddeed-pytest
      - biddeed-deepeval
      - zonewise-agent-tests
      - zonewise-playwright
      - langgraph-trajectory
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install supabase --break-system-packages

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Aggregate + log to Supabase
        run: python scripts/aggregate_results.py

      - name: Auto-heal if failures detected
        run: python scripts/trigger_healer.py
        env:
          HEAL_ENABLED: 'true'
          MAX_HEAL_CYCLES: '3'

      - name: Open GitHub Issue on critical failure
        if: failure()
        run: python scripts/open_issue_on_failure.py
