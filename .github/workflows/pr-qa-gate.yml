name: QA Gate — Block Merge on Failure

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  qa-gate:
    name: QA Gate (Fast Path)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install deepeval pytest pytest-asyncio --break-system-packages

      - name: Run fast unit tests only
        run: |
          pytest tests/ -v --tb=short \
            -m "unit" \
            --timeout=60 \
            -x  # Stop on first failure

      - name: Check DeepEval score threshold
        run: |
          deepeval test run tests/biddeed/evals/ \
            --min-score 0.8 \
            --fail-on-threshold-breach

      - name: Post result to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ job.status }}';
            const emoji = outcome === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} **QA Gate:** ${outcome}\n\nSee [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
            });
